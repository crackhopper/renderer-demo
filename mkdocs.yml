site_name: Renderer Demo Notes
site_description: 基于 Vulkan 的 C++20 渲染器示例 — 面向人类阅读者的中文项目速览
docs_dir: notes
site_dir: .site

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换深色
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换浅色
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

nav:
  - 总览: README.md
  - 架构: architecture.md
  - 术语表: glossary.md
  - 子系统:
      - String Interning:   subsystems/string-interning.md
      - Shader System:      subsystems/shader-system.md
      - Material System:    subsystems/material-system.md
      - Pipeline Identity:  subsystems/pipeline-identity.md
      - Pipeline Cache:     subsystems/pipeline-cache.md
      - Frame Graph:        subsystems/frame-graph.md
      - Scene:              subsystems/scene.md
      - Geometry:           subsystems/geometry.md
      - Skeleton:           subsystems/skeleton.md
      - Vulkan Backend:     subsystems/vulkan-backend.md
  - Tutorial — PBR 立方体:
      - 概览:                tutorial/00-overview.md
      - 01 PBR 理论:         tutorial/01-pbr-theory.md
      - 02 PBR Shader:       tutorial/02-pbr-shader.md
      - 03 Material Loader:  tutorial/03-material-loader.md
      - 04 立方体几何:        tutorial/04-cube-geometry.md
      - 05 main.cpp:         tutorial/05-app-main.md
      - 06 构建与运行:        tutorial/06-build-and-run.md
  - Roadmap — 走向 AI-Native 引擎:
      - 总览:                  roadmaps/README.md
      - 架构原则 (Principles): roadmaps/principles.md
      - 00 Gap Analysis:       roadmaps/00-gap-analysis.md
      - 01 渲染深度 + Web 后端: roadmaps/phase-1-rendering-depth.md
      - 02 基础层 + 内省:       roadmaps/phase-2-foundation-layer.md
      - 03 资产管线:           roadmaps/phase-3-asset-pipeline.md
      - 04 动画:              roadmaps/phase-4-animation.md
      - 05 物理:              roadmaps/phase-5-physics.md
      - 06 Gameplay (TS):      roadmaps/phase-6-gameplay-layer.md
      - 07 音频:              roadmaps/phase-7-audio.md
      - 08 Vue UI 容器:        roadmaps/phase-8-web-ui.md
      - 09 Web 编辑器:         roadmaps/phase-9-web-editor.md
      - 10 MCP + Agent + CLI:  roadmaps/phase-10-ai-agent-mcp.md
      - 11 AI 资产生成:        roadmaps/phase-11-ai-asset-generation.md
      - 12 打包与发布:         roadmaps/phase-12-release.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      toc_depth: 3

exclude_docs: |
  .sync-meta.json
  0324-after-implement.md

extra:
  generator: false
